services:
  api:
    build: .
    container_name: rag-platform-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: rag-platform-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: rag-platform-postgres
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag-platform-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

