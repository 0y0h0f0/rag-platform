services:
  api:
    build: .
    container_name: rag-platform-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      LLM_PROVIDER: api
      LLM_BASE_URL: http://host.docker.internal:8001/v1
      LLM_MODEL: Qwen/Qwen2.5-7B-Instruct-AWQ
      LLM_API_KEY: dummy
      LLM_TIMEOUT_SECONDS: "120"
      EMBEDDING_PROVIDER: legacy
      EMBEDDING_BACKEND: sentence_transformers
      EMBEDDING_MODEL_NAME: BAAI/bge-small-zh-v1.5
      EMBEDDING_DIM: "512"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: rag-platform
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: rag-platform-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      LLM_PROVIDER: api
      LLM_BASE_URL: http://host.docker.internal:8001/v1
      LLM_MODEL: Qwen/Qwen2.5-7B-Instruct-AWQ
      LLM_API_KEY: dummy
      LLM_TIMEOUT_SECONDS: "120"
      EMBEDDING_PROVIDER: legacy
      EMBEDDING_BACKEND: sentence_transformers
      EMBEDDING_MODEL_NAME: BAAI/bge-small-zh-v1.5
      EMBEDDING_DIM: "512"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: rag-platform-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: rag-platform-postgres
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag-platform-redis
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rag-platform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  postgres_data:
