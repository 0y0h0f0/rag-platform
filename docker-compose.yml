services:
  api:
    build: .
    container_name: rag-platform-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      LLM_PROVIDER: ollama
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: qwen2.5:7b-instruct-q4_K_M
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: rag-platform
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - ollama

  worker:
    build: .
    container_name: rag-platform-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      LANCEDB_URI: /app/data/lancedb
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      LLM_PROVIDER: ollama
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: qwen2.5:7b-instruct-q4_K_M
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: rag-platform-worker
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: rag-platform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16
    container_name: rag-platform-postgres
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag-platform-redis
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rag-platform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  postgres_data:
  ollama_data:
