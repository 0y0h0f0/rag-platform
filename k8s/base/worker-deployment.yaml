apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: rag-platform
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: rag-platform:latest
          command:
            - celery
            - "-A"
            - app.workers.celery_app.celery_app
            - worker
            - "--loglevel=info"
          envFrom:
            - configMapRef:
                name: rag-platform-config
            - secretRef:
                name: rag-platform-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: lancedb-data
              mountPath: /data
      volumes:
        - name: lancedb-data
          persistentVolumeClaim:
            claimName: lancedb-pvc
